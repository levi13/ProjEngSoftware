{% extends "schedule/base.html" %}

{% block content %}
<h2>{% if editar %}Editar Agendamento{% else %}Novo Agendamento{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">
        {% if editar %}Atualizar{% else %}Salvar{% endif %}
    </button>
    <a href="{% url 'agendamentos_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
